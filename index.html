<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하주초 교육활동 사진방</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #0f172a;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.8);
            --text: #1e293b;
            --text-muted: #64748b;
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.05) 0px, transparent 50%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        body.no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--text);
            border: 1px solid #e2e8f0;
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-download {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
            display: none;
        }

        .btn-download:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .btn-zip {
            background: #8b5cf6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.2);
            display: none;
        }

        .btn-zip:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        .btn-drive {
            color: #34a853;
            border-color: #34a853;
        }

        .btn-drive:hover {
            background: #f0fdf4;
            border-color: #166534;
            color: #166534;
        }

        .btn-select-all {
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            height: auto;
            border-color: #cbd5e1;
            color: #64748b;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            top: 50%;
            left: 50%;
            margin: -0.625rem 0 0 -0.625rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Layout */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.5rem;
        }

        .logo img {
            height: 40px;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .breadcrumb {
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            font-weight: 600;
        }

        .breadcrumb span:not(:last-child)::after {
            content: "\f054";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            margin-left: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .breadcrumb a {
            color: var(--primary-light);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--secondary);
        }

        .section-title i {
            color: var(--primary-light);
        }

        /* Folders/Files Grid */
        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .folder-card {
            background: white;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
        }

        .folder-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .folder-card.selected {
            background: #eff6ff;
            border-color: var(--primary);
        }

        .folder-card.selected::after {
            content: "\f00c";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            box-shadow: var(--shadow);
        }

        .folder-card i {
            font-size: 2.5rem;
            color: #fcd34d;
        }

        .folder-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .file-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .file-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
            z-index: 10;
        }

        .file-card.selected {
            background: #eff6ff;
            border: 2px solid var(--primary);
            transform: translateY(-5px) scale(0.98);
        }

        .file-card.selected .file-thumb {
            opacity: 0.8;
        }

        .file-check {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: var(--shadow);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }

        .file-card:hover .file-check, .file-card.selected .file-check {
            opacity: 1;
        }

        .file-card.selected .file-check {
            background: var(--primary);
            color: white;
        }

        .file-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            backdrop-filter: blur(4px);
        }

        .file-thumb {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #f1f5f9;
        }

        .file-info {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            padding: 0.25rem;
            opacity: 0.6;
        }

        .btn-delete:hover {
            color: #ef4444;
            opacity: 1;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .modal-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .modal-content p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .prompt-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            outline: none;
        }

        .prompt-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .upload-area {
            border: 2px dashed #e2e8f0;
            padding: 2rem;
            text-align: center;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: var(--primary-light);
            background: #f8fafc;
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        #selected-files {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: #f1f5f9;
            margin-bottom: 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }

        .progress-container {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 1rem;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-light);
            width: 0;
            transition: width 0.3s;
        }

        #preview-container img, #preview-container video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
        }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            .logo span { display: none; }
            .folders-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .files-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .modal-content { padding: 1.5rem; }
        }

        /* Drag Selector */
        #drag-selector {
            position: fixed;
            border: 1px solid var(--primary-light);
            background: rgba(59, 130, 246, 0.1);
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        /* Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -25px 0 0 -25px;
            animation: spin 1s linear infinite;
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }

        .toast {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 300px;
            border-left: 5px solid var(--primary);
            pointer-events: auto;
        }

        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="loadFolder(null)">
        <img src="https://www.haju.es.kr/site/haju/img/sub/img_sub0102_02.jpg" alt="Logo">
        <span>하주초 사진방</span>
    </a>
    <div class="actions">
        <a id="drive-link" href="#" target="_blank" class="btn btn-outline btn-drive" title="구글 드라이브에서 열기">
            <i class="fab fa-google-drive"></i> 드라이브
        </a>
        <button id="multi-zip-btn" class="btn btn-zip" onclick="downloadAsZip()">
            <i class="fas fa-file-archive"></i> ZIP 압축
        </button>
        <button id="multi-download-btn" class="btn btn-download" onclick="downloadSelected()">
            <i class="fas fa-download"></i> <span id="download-count">0개 다운로드</span>
        </button>
        <button class="btn btn-outline" onclick="openUploadModal()">
            <i class="fas fa-cloud-upload-alt"></i> 업로드
        </button>
    </div>
</header>

<main>
    <div id="breadcrumb" class="breadcrumb">
        <span><a href="#" onclick="loadFolder(null)">Home</a></span>
    </div>

    <div id="folders-section">
        <h2 class="section-title"><i class="fas fa-folder-open"></i> 모든 폴더</h2>
        <div id="folders-list" class="folders-grid">
            <!-- Folders injected here -->
        </div>
    </div>

    <div id="files-section">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h2 class="section-title" style="margin: 0;"><i class="fas fa-images"></i> 사진 및 영상</h2>
            <button class="btn btn-outline btn-select-all" onclick="selectAllFiles()">
                <i class="fas fa-check-double"></i> 전체 선택/해제
            </button>
        </div>
        <div id="files-list" class="files-grid" style="margin-top: 1rem;">
            <!-- Files injected here -->
        </div>
    </div>
</main>

<!-- Modals -->
<div id="upload-modal" class="modal">
    <div class="modal-content">
        <h3>파일 업로드</h3>
        <p>폴더를 선택하거나 직접 드래그하여 업로드하세요.</p>
        
        <div class="form-group">
            <label class="form-label">업로드 할 폴더 선택</label>
            <select id="target-folder-select" class="form-input"></select>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="create-folder-check" onchange="toggleNewFolderInput()">
            <label for="create-folder-check" style="font-weight: 600;">새 폴더 생성 후 업로드</label>
        </div>

        <div id="new-folder-input" class="form-group" style="display: none; background: #f8fafc; padding: 1rem; border-radius: var(--radius-md);">
            <p style="margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--primary);">규칙: 일시(MMDD) + 활동명 (예: 0412 과학행사)</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="target-date" class="form-input" placeholder="날짜(MMDD)" style="width: 100px;" maxlength="4">
                <input type="text" id="target-name" class="form-input" placeholder="활동명 예: 과학행사">
            </div>
        </div>
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>사진이나 영상을 여기에 드래그하거나 클릭하여 선택하세요.</p>
            <input type="file" id="file-input" multiple style="display: none" onchange="handleFileSelect(event)">
        </div>
        
        <div id="selected-files"></div>

        <div id="upload-progress" class="progress-container">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 1rem;">
            <span id="progress-text" style="color: var(--text-muted);">대기 중...</span>
            <span id="progress-percent" style="font-weight: 700; color: var(--primary);">0%</span>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button class="btn btn-outline" style="flex: 1" onclick="closeModal('upload-modal')">취소</button>
            <button id="upload-btn" class="btn btn-primary" style="flex: 1" onclick="handleUpload()">업로드 시작</button>
        </div>
    </div>
</div>

<div id="success-modal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <div style="width: 60px; height: 60px; background: #ecfdf5; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.5rem;">
            <i class="fas fa-check"></i>
        </div>
        <h3 id="success-title">완료되었습니다!</h3>
        <p id="success-msg"></p>
        <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="closeModal('success-modal')">확인</button>
    </div>
</div>

<div id="confirm-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3 id="confirm-title">확인</h3>
        <p id="confirm-msg"></p>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="flex: 1; justify-content: center;" onclick="closeModal('confirm-modal')">취소</button>
            <button id="confirm-ok-btn" class="btn btn-primary" style="flex: 1; justify-content: center;">확인</button>
        </div>
    </div>
</div>

<div id="prompt-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3 id="prompt-title">입력</h3>
        <p id="prompt-msg"></p>
        <input type="text" id="prompt-input" class="prompt-input" placeholder="이름을 입력하세요">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="flex: 1; justify-content: center;" onclick="closeModal('prompt-modal')">취소</button>
            <button id="prompt-ok-btn" class="btn btn-primary" style="flex: 1; justify-content: center;">확인</button>
        </div>
    </div>
</div>

<div id="password-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3>삭제 확인</h3>
        <p>삭제를 계속하시려면 관리자 비밀번호를 입력하세요.</p>
        <input type="password" id="admin-password" class="prompt-input" placeholder="비밀번호 입력">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="flex: 1; justify-content: center;" onclick="closeModal('password-modal')">취소</button>
            <button class="btn btn-primary" style="flex: 1; justify-content: center; background: #ef4444;" onclick="confirmDelete()">삭제 실행</button>
        </div>
    </div>
</div>

<div id="preview-modal" class="modal">
    <div class="modal-content" style="padding:0; background:transparent; box-shadow:none; width:auto; max-width:95vw;">
        <button onclick="closeModal('preview-modal')" style="position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.5); color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; z-index:100; font-size:1.2rem;">
            <i class="fas fa-times"></i>
        </button>
        <div id="preview-container" style="display:flex; justify-content:center; align-items:center; min-height:50vh;">
            <!-- content -->
        </div>
    </div>
</div>

<div id="drag-selector"></div>
<div id="loader"><div class="spinner"></div></div>
<div id="toast-container"></div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzynRIlDMKyrZ5LY2xxTHXkwJjQnLcZc1Wjlk6nBtetJIsbAMHmzl3s-PlXNgJAz7w/exec';
    
    let currentFolderId = null;
    let folderPath = [];
    let allFoldersList = [];
    let itemToDelete = null;
    let selectedIds = new Set(); 
    let currentFiles = []; 
    let filesToUpload = [];

    window.onload = () => {
        loadFolder(null);
        fetchFolderList();
    };

    async function loadFolder(folderId) {
        showLoader(true);
        selectedIds.clear();
        currentFiles = [];
        updateDownloadButton();
        try {
            const resp = await fetch(`${GAS_URL}?action=getFiles&folderId=${folderId || ''}`);
            const data = await resp.json();
            renderContent(data);
            updateBreadcrumbs(data);
            currentFolderId = data.currentFolderId;
            
            const driveBtn = document.getElementById('drive-link');
            if (data.driveUrl) {
                driveBtn.href = data.driveUrl;
                driveBtn.style.display = 'inline-flex';
            } else {
                driveBtn.style.display = 'none';
            }
        } catch (err) {
            console.error(err);
            showToast('데이터를 가져오는 중 오류가 발생했습니다.', 'error');
        } finally {
            showLoader(false);
        }
    }

    async function fetchFolderList() {
        try {
            const resp = await fetch(`${GAS_URL}?action=getAllFolders`);
            allFoldersList = await resp.json();
            const select = document.getElementById('target-folder-select');
            select.innerHTML = '';
            allFoldersList.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.innerText = f.name;
                if (f.id === currentFolderId) opt.selected = true;
                select.appendChild(opt);
            });
        } catch (err) {}
    }

    function renderContent(data) {
        const fList = document.getElementById('folders-list');
        const fileList = document.getElementById('files-list');
        fList.innerHTML = '';
        fileList.innerHTML = '';
        currentFiles = data.files;

        if (data.folders.length === 0) {
            document.getElementById('folders-section').style.display = 'none';
        } else {
            document.getElementById('folders-section').style.display = 'block';
            data.folders.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.dataset.id = folder.id;
                card.onclick = (e) => toggleSelect(folder.id, card);
                card.innerHTML = `
                    <i class="fas fa-folder"></i>
                    <div class="details" style="flex:1;">
                        <h3>${folder.name}</h3>
                    </div>
                    <button class="btn-delete" style="opacity:1; color:var(--primary); font-size:1.2rem;" onclick="event.stopPropagation(); loadFolder('${folder.id}')">
                        <i class="fas fa-chevron-circle-right"></i>
                    </button>
                    <button class="btn-delete" style="opacity:1; margin-left:10px;" onclick="event.stopPropagation(); promptDelete('${folder.id}', 'folder')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                fList.appendChild(card);
            });
        }

        if (data.files.length === 0) {
            if (data.folders.length === 0) {
                fileList.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);">폴더가 비어있습니다.</div>';
            }
        } else {
            data.files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.dataset.id = file.id;
                card.onclick = () => toggleSelect(file.id, card);
                
                const isVideo = file.isVideo;
                card.innerHTML = `
                    <div class="file-check"><i class="fas fa-check"></i></div>
                    <img class="file-thumb" src="${file.thumbnail}" alt="${file.name}" loading="lazy">
                    ${isVideo ? '<div class="file-badge"><i class="fas fa-play"></i> Video</div>' : ''}
                    <div class="file-info">
                        <span class="file-name" title="${file.name}">${file.name}</span>
                        <div style="display:flex; gap:12px; align-items:center;">
                            <button class="btn-delete" style="opacity:1; color:#3b82f6; font-size:1.1rem;" onclick="event.stopPropagation(); openPreviewById('${file.id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn-delete" style="opacity:1; font-size:1.1rem;" onclick="event.stopPropagation(); promptDelete('${file.id}', 'file')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
                fileList.appendChild(card);
            });
        }
    }

    function toggleSelect(id, element) {
        if (selectedIds.has(id)) {
            selectedIds.delete(id);
            element.classList.remove('selected');
        } else {
            selectedIds.add(id);
            element.classList.add('selected');
        }
        updateDownloadButton();
    }

    function updateDownloadButton() {
        const dBtn = document.getElementById('multi-download-btn');
        const zBtn = document.getElementById('multi-zip-btn');
        const countSpan = document.getElementById('download-count');
        if (selectedIds.size > 0) {
            dBtn.style.display = 'inline-flex';
            zBtn.style.display = 'inline-flex';
            countSpan.innerText = `${selectedIds.size}개 다운로드`;
        } else {
            dBtn.style.display = 'none';
            zBtn.style.display = 'none';
        }
    }

    function selectAllFiles() {
        const cards = document.querySelectorAll('.file-card, .folder-card');
        const allSelected = Array.from(cards).every(card => selectedIds.has(card.dataset.id));
        if (allSelected) {
            selectedIds.clear();
            cards.forEach(card => card.classList.remove('selected'));
        } else {
            cards.forEach(card => {
                selectedIds.add(card.dataset.id);
                card.classList.add('selected');
            });
        }
        updateDownloadButton();
    }

    async function downloadAsZip() {
        if (selectedIds.size === 0) return;
        showCustomPrompt("ZIP 압축 다운로드", "압축 파일 이름을 입력하세요:", "haju_photos", async (zipName) => {
            if (!zipName) return;
            showLoader(true);
            showToast('압축 중... (폴더 포함 시 시간이 소요됩니다)', 'info');
            try {
                const resp = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getZip', itemIds: Array.from(selectedIds), zipName: zipName })
                });
                const result = await resp.json();
                if (result.success) {
                    showToast('압축 완료! 다운로드를 시작합니다.', 'success');
                    const link = document.createElement('a');
                    link.href = result.downloadUrl;
                    link.click();
                    selectedIds.clear();
                    document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
                    updateDownloadButton();
                } else {
                    showToast(result.error, 'error');
                }
            } catch (err) {
                showToast('압축 오류 발생', 'error');
            } finally {
                showLoader(false);
            }
        });
    }

    async function downloadSelected() {
        if (selectedIds.size === 0) return;
        showCustomConfirm("다운로드 확인", `${selectedIds.size}개 항목을 다운로드하시겠습니까?<br><small style="color:red">* 폴더는 ZIP 압축을 권장합니다.</small>`, async () => {
            const ids = Array.from(selectedIds);
            for (const id of ids) {
                const file = currentFiles.find(f => f.id === id);
                if (!file) continue;
                const link = document.createElement('a');
                link.href = `https://drive.google.com/uc?export=download&id=${id}`;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                await new Promise(r => setTimeout(r, 400));
            }
            selectedIds.clear();
            document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            updateDownloadButton();
        });
    }

    function openPreviewById(id) {
        const file = currentFiles.find(f => f.id === id);
        if (file) openPreview(file);
        else showToast('파일 정보 부족', 'error');
    }

    // --- Drag to Select ---
    let isDragging = false;
    let startX, startY;
    const dragSelector = document.getElementById('drag-selector');

    document.addEventListener('mousedown', e => {
        if (e.target.closest('.modal') || e.target.closest('header') || e.target.closest('.btn') || e.target.closest('.breadcrumb')) return;
        if (!e.target.closest('.file-card') && !e.target.closest('.folder-card')) {
            selectedIds.clear();
            document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            updateDownloadButton();
        }
        if (e.button !== 0) return;
        isDragging = true;
        document.body.classList.add('no-select');
        startX = e.clientX;
        startY = e.clientY;
        dragSelector.style.left = startX + 'px';
        dragSelector.style.top = startY + 'px';
        dragSelector.style.width = '0px';
        dragSelector.style.height = '0px';
    });

    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const left = Math.min(startX, e.clientX);
        const top = Math.min(startY, e.clientY);
        const width = Math.abs(startX - e.clientX);
        const height = Math.abs(startY - e.clientY);
        if (width > 5 || height > 5) {
            dragSelector.style.display = 'block';
            dragSelector.style.left = left + 'px';
            dragSelector.style.top = top + 'px';
            dragSelector.style.width = width + 'px';
            dragSelector.style.height = height + 'px';
            checkSelection(left, top, width, height);
        }
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        document.body.classList.remove('no-select');
        dragSelector.style.display = 'none';
    });

    function checkSelection(sLeft, sTop, sWidth, sHeight) {
        const cards = document.querySelectorAll('.file-card, .folder-card');
        const sRight = sLeft + sWidth;
        const sBottom = sTop + sHeight;
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const isOverlap = !(rect.right < sLeft || rect.left > sRight || rect.bottom < sTop || rect.top > sBottom);
            if (isOverlap && !selectedIds.has(card.dataset.id)) {
                selectedIds.add(card.dataset.id);
                card.classList.add('selected');
            }
        });
        updateDownloadButton();
    }

    // --- Upload ---
    function openUploadModal() {
        resetUploadState();
        document.getElementById('upload-modal').classList.add('active');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function toggleNewFolderInput() { 
        const isChecked = document.getElementById('create-folder-check').checked;
        document.getElementById('new-folder-input').style.display = isChecked ? 'block' : 'none';
        document.getElementById('target-folder-select').disabled = isChecked;
    }
    function handleFileSelect(e) {
        const files = Array.from(e.target.files);
        appendFiles(files);
    }
    function appendFiles(files) {
        const container = document.getElementById('selected-files');
        files.forEach(file => {
            filesToUpload.push(file);
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${file.name}</span><i class="fas fa-times" style="cursor:pointer;" onclick="removeFile(this, '${file.name}')"></i>`;
            container.appendChild(div);
        });
    }
    function removeFile(el, name) {
        filesToUpload = filesToUpload.filter(f => f.name !== name);
        el.parentElement.remove();
    }
    async function handleUpload() {
        if (filesToUpload.length === 0) return showToast('파일을 선택하세요.', 'error');
        const btn = document.getElementById('upload-btn');
        const isNewFolder = document.getElementById('create-folder-check').checked;
        const targetDate = document.getElementById('target-date').value;
        const targetName = document.getElementById('target-name').value;
        if (isNewFolder && (!targetDate || !targetName)) return showToast('날짜와 활동명을 입력하세요.', 'error');
        const finalFolderName = isNewFolder ? `${targetDate} ${targetName}` : "";
        let currentTargetId = document.getElementById('target-folder-select').value;
        btn.disabled = true;
        btn.classList.add('btn-loading');
        showProgress(true);
        for (let i = 0; i < filesToUpload.length; i++) {
            const file = filesToUpload[i];
            updateProgress(i, filesToUpload.length, 0, file.name);
            try {
                const base64Data = await convertToBase64(file);
                const resp = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'upload', data: base64Data, fileName: file.name, mimeType: file.type, targetFolderId: currentTargetId, newFolderName: i === 0 ? finalFolderName : "" })
                });
                const result = await resp.json();
                if (i === 0 && result.folderId) currentTargetId = result.folderId;
                updateProgress(i + 1, filesToUpload.length, 100, file.name);
            } catch (err) { break; }
        }
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        showSuccessModal('업로드 완료', '성공적으로 저장되었습니다.');
        closeModal('upload-modal');
        loadFolder(currentFolderId);
    }
    function convertToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });
    }
    function openPreview(file) {
        const container = document.getElementById('preview-container');
        container.innerHTML = file.isVideo ? `<iframe src="${file.previewUrl}" width="800" height="450" frameborder="0"></iframe>` : `<img src="${file.previewUrl}">`;
        document.getElementById('preview-modal').classList.add('active');
    }
    function promptDelete(id, type) { itemToDelete = { id, type }; document.getElementById('password-modal').classList.add('active'); }
    async function confirmDelete() {
        const password = document.getElementById('admin-password').value;
        if (!password) return showToast('비밀번호 필수', 'error');
        showLoader(true);
        try {
            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', itemId: itemToDelete.id, itemType: itemToDelete.type, password: password }) });
            const result = await resp.json();
            if (result.success) { showToast('삭제됨', 'success'); closeModal('password-modal'); loadFolder(currentFolderId); }
            else showToast(result.error, 'error');
        } finally { showLoader(false); }
    }
    function updateBreadcrumbs(data) {
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = `<span><a href="#" onclick="loadFolder(null)">Home</a></span>`;
    }
    function showToast(m, t = 'info') {
        const c = document.getElementById('toast-container');
        const div = document.createElement('div');
        div.className = `toast ${t}`;
        div.innerHTML = `<span>${m}</span>`;
        c.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }
    function showProgress(s) { document.getElementById('upload-progress').style.display = s ? 'block' : 'none'; }
    function updateProgress(d, t, p, n) {
        document.getElementById('progress-fill').style.width = Math.floor(((d / t) * 100)) + '%';
        document.getElementById('progress-text').innerText = `${n} (${d}/${t})`;
    }
    function resetUploadState() { filesToUpload = []; document.getElementById('selected-files').innerHTML = ''; }
</script>
</body>
</html>
