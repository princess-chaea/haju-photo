<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하주초 교육활동 사진방</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #64748b;
            --accent: #f59e0b;
            --background: #f8fafc;
            --surface: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --text-muted: #64748b;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 24px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Glassmorphism Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        /* Layout */
        body.no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        .modal-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .modal-content p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .prompt-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            outline: none;
        }

        .prompt-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .logo i {
            font-size: 1.5rem;
        }

        .btn-download {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
            display: none;
        }

        .btn-download:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--text);
            border: 1px solid #e2e8f0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            top: 50%;
            left: 50%;
            margin: -0.625rem 0 0 -0.625rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-zip {
            background: #8b5cf6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.2);
            display: none;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-zip:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        .btn-drive {
            color: #34a853;
            border-color: #34a853;
            display: none;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-drive:hover {
            background: #f0fdf4;
            border-color: #166534;
            color: #166534;
        }

        .btn-select-all {
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            height: auto;
            border-color: #cbd5e1;
            color: #64748b;
        }

        .btn-select-all:hover {
            background: #f8fafc;
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }

        .toast {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: toastUp 0.3s ease-out, toastDown 0.3s ease-in 2.7s forwards;
            min-width: 300px;
            border-left: 5px solid var(--primary);
        }

        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }

        @keyframes toastUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes toastDown {
            to { transform: translateY(100%); opacity: 0; }
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Breadcrumbs */
        .breadcrumb {
            display: flex;
            padding: 0.5rem 1rem;
            margin-bottom: 2rem;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            width: fit-content;
        }

        .breadcrumb span {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb i {
            margin: 0 0.75rem;
            font-size: 0.75rem;
            color: #cbd5e1;
        }

        /* Grid sections */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--secondary);
        }

        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .folder-card {
            background: white;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .folder-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .folder-card i {
            color: #fbbf24;
            font-size: 1.5rem;
        }

        .folder-card .details {
            overflow: hidden;
        }

        .folder-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .file-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
        }

        .file-card:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-lg);
        }

        .file-thumb {
            aspect-ratio: 16/10;
            width: 100%;
            object-fit: cover;
            background: #f1f5f9;
        }

        .file-info {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .file-card.selected {
            background: #eff6ff;
            border: 2px solid var(--primary-light);
            transform: scale(0.98);
        }

        .file-card.selected .file-thumb {
            opacity: 0.8;
        }

        .file-check {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: var(--shadow);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }

        .file-card:hover .file-check, .file-card.selected .file-check {
            opacity: 1;
        }

        .file-card.selected .file-check {
            background: var(--primary);
            color: white;
        }

        .file-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            backdrop-filter: blur(4px);
        }

        .btn-delete {
            color: #ef4444;
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .file-card:hover .btn-delete {
            opacity: 1;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-md);
            padding: 3rem;
            text-align: center;
            margin: 1.5rem 0;
            transition: all 0.2s;
            cursor: pointer;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-light);
            background: #eff6ff;
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--primary-light);
            margin-bottom: 1rem;
        }

        .progress-container {
            margin-top: 1rem;
            display: none;
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        /* Image/Video Modal Customization */
        .preview-modal {
            max-width: 90vw;
            width: auto;
            background: transparent;
            padding: 0;
        }

        .preview-modal img, .preview-modal iframe {
            max-width: 100%;
            max-height: 80vh;
            border-radius: var(--radius-md);
            display: block;
        }

        .preview-modal .modal-close {
            color: white;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Loading Spinner */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            .logo span { display: none; }
            .folders-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .files-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .modal-content { padding: 1.5rem; }
        }

        /* Drag Selector */
        #drag-selector {
            position: fixed;
            border: 1px solid var(--primary-light);
            background: rgba(59, 130, 246, 0.1);
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="loadFolder(null)">
        <i class="fas fa-camera-retro"></i>
        <span>하주초 사진방</span>
    </a>
    <div class="actions">
        <a id="drive-link" href="#" target="_blank" class="btn btn-outline btn-drive" title="구글 드라이브에서 열기">
            <i class="fab fa-google-drive"></i> 드라이브
        </a>
        <button id="multi-zip-btn" class="btn btn-zip" onclick="downloadAsZip()">
            <i class="fas fa-file-archive"></i> ZIP 압축
        </button>
        <button id="multi-download-btn" class="btn btn-download" onclick="downloadSelected()">
            <i class="fas fa-download"></i> <span id="download-count">다운로드</span>
        </button>
        <button class="btn btn-outline" onclick="openUploadModal()">
            <i class="fas fa-cloud-upload-alt"></i> 업로드
        </button>
    </div>
</header>

<main>
    <div id="breadcrumb" class="breadcrumb">
        <!-- Breadcrumbs injected here -->
    </div>

    <div id="folders-section">
        <h2 class="section-title"><i class="fas fa-folder-open"></i> 폴더</h2>
        <div id="folders-list" class="folders-grid">
            <!-- Folders injected here -->
        </div>
    </div>

    <div id="files-section">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h2 class="section-title" style="margin: 0;"><i class="fas fa-images"></i> 사진 및 영상</h2>
            <button class="btn btn-outline btn-select-all" onclick="selectAllFiles()">
                <i class="fas fa-check-double"></i> 전체 선택/해제
            </button>
        </div>
        <div id="files-list" class="files-grid" style="margin-top: 1rem;">
            <!-- Files injected here -->
        </div>
    </div>
</main>

<!-- Upload Modal -->
<div id="upload-modal" class="modal">
    <div class="modal-content">
        <i class="fas fa-times modal-close" onclick="closeModal('upload-modal')"></i>
        <h2 style="margin-bottom: 0.5rem;">파일 업로드</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">선택한 폴더로 사진이나 영상을 업로드합니다.</p>
        
        <div style="margin-top: 1.5rem;">
            <label style="font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.5rem;">대상 폴더</label>
            <select id="target-folder-select" class="btn btn-outline" style="width: 100%; appearance: auto; margin-bottom: 1rem;">
                <!-- Folders injected here -->
            </select>
            
            <div id="new-folder-toggle" style="margin-bottom: 1rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; cursor: pointer;">
                    <input type="checkbox" id="create-folder-check"> 새 폴더 만들기
                </label>
            </div>
            
            <div id="new-folder-input" style="display: none; margin-bottom: 1rem;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.75rem; color: var(--text-muted);">날짜 선택</label>
                        <input type="date" id="new-folder-date" class="btn btn-outline" style="width: 100%; text-align: left; padding: 0.5rem;">
                    </div>
                    <div style="flex: 2;">
                        <label style="font-size: 0.75rem; color: var(--text-muted);">활동명 입력</label>
                        <input type="text" id="new-folder-activity" placeholder="활동명 (예: 과학캠프)" class="btn btn-outline" style="width: 100%; text-align: left; padding: 0.5rem;">
                    </div>
                </div>
            </div>
        </div>

        <div id="drop-zone" class="upload-area">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>파일을 여기에 끌어놓거나 클릭하세요</p>
            <input type="file" id="file-input" multiple accept="image/*,video/*" style="display: none;">
        </div>

        <div id="selected-files" style="max-height: 150px; overflow-y: auto; margin-bottom: 1rem;">
            <!-- Selected file list -->
        </div>

        <div id="upload-progress" class="progress-container">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem;">
                <span id="progress-text">업로드 중...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <button id="upload-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; justify-content: center;" onclick="handleUpload()">
            업로드 시작
        </button>
    </div>
</div>

<!-- Preview Modal -->
<div id="preview-modal" class="modal">
    <div class="modal-content preview-modal">
        <i class="fas fa-times modal-close" onclick="closeModal('preview-modal')"></i>
        <div id="preview-container">
            <!-- Image or Video injected here -->
        </div>
    </div>
</div>

<!-- Password Modal -->
<div id="password-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <i class="fas fa-times modal-close" onclick="closeModal('password-modal')"></i>
        <h3>비밀번호 확인</h3>
        <p style="margin: 1rem 0; font-size: 0.9rem; color: var(--text-muted);">삭제 작업을 계속하려면 관리자 비밀번호를 입력하세요.</p>
        <input type="password" id="admin-password" class="btn btn-outline" style="width: 100%; margin-bottom: 1rem;" placeholder="비밀번호">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="flex: 1; justify-content: center;" onclick="closeModal('password-modal')">취소</button>
            <button class="btn btn-primary" style="flex: 1; justify-content: center; background: #ef4444;" onclick="confirmDelete()">삭제</button>
        </div>
    </div>
</div>

<div id="success-modal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <div style="width: 60px; height: 60px; background: #ecfdf5; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 1.5rem;">
            <i class="fas fa-check"></i>
        </div>
        <h3 id="success-title">완료되었습니다!</h3>
        <p id="success-msg" style="margin: 1rem 0; color: var(--text-muted); font-size: 0.9rem;">작업이 성공적으로 마쳤습니다.</p>
        <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="closeModal('success-modal')">확인</button>
    </div>
</div>

<div id="drag-selector"></div>
<div id="loader"><div class="spinner"></div></div>
<div id="toast-container"></div>

<script>
    // --- Configuration ---
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzynRIlDMKyrZ5LY2xxTHXkwJjQnLcZc1Wjlk6nBtetJIsbAMHmzl3s-PlXNgJAz7w/exec';
    
    let currentFolderId = null;
    let folderPath = [];
    let allFoldersList = [];
    let itemToDelete = null;
    let selectedFileIds = new Set();
    let currentFiles = []; // 미리보기 및 다운로드 참조용

    // --- Core Functions ---

    window.onload = () => {
        loadFolder(null);
        fetchFolderList();
        
        // 오늘 날짜 기본 세팅
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('new-folder-date').value = today;
    };

    /**
     * 특정 폴더의 내용 로드
     */
    async function loadFolder(folderId) {
        showLoader(true);
        selectedFileIds.clear();
        currentFiles = [];
        updateDownloadButton();
        try {
            const resp = await fetch(`${GAS_URL}?action=getFiles&folderId=${folderId || ''}`);
            const data = await resp.json();
            renderContent(data);
            updateBreadcrumbs(data);
            currentFolderId = data.currentFolderId;
            
            // 드라이브 링크 업데이트
            const driveBtn = document.getElementById('drive-link');
            if (data.driveUrl) {
                driveBtn.href = data.driveUrl;
                driveBtn.style.display = 'inline-flex';
            } else {
                driveBtn.style.display = 'none';
            }
        } catch (err) {
            console.error(err);
            showToast('데이터를 가져오는 중 오류가 발생했습니다.', 'error');
        } finally {
            showLoader(false);
        }
    }

    /**
     * 전체 폴더 목록 가져오기 (업로드용)
     */
    async function fetchFolderList() {
        try {
            const resp = await fetch(`${GAS_URL}?action=getAllFolders`);
            allFoldersList = await resp.json();
            renderFolderSelect();
        } catch (err) {
            console.error("폴더 목록 로드 실패", err);
        }
    }

    function renderContent(data) {
        const fList = document.getElementById('folders-list');
        const fileList = document.getElementById('files-list');
        
        fList.innerHTML = '';
        fileList.innerHTML = '';
        currentFiles = data.files; // 데이터 백업

        // 폴더 렌더링
        if (data.folders.length === 0) {
            document.getElementById('folders-section').style.display = 'none';
        } else {
            document.getElementById('folders-section').style.display = 'block';
            data.folders.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => loadFolder(folder.id);
                card.innerHTML = `
                    <i class="fas fa-folder"></i>
                    <div class="details">
                        <h3>${folder.name}</h3>
                    </div>
                `;
                fList.appendChild(card);
            });
        }

        // 파일 렌더링
        if (data.files.length === 0) {
            fileList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 3rem;">업로드된 파일이 없습니다.</p>';
        } else {
            data.files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.dataset.id = file.id;
                card.onclick = (e) => {
                    if (e.target.closest('.btn-delete')) return;
                    
                    // Click the card to SELECT instead of preview when multiple possible? 
                    // Let's use click for SELECT, double click for PREVIEW, or check icon for select.
                    // To keep it simple: Click toggles selection. A small eye icon for preview.
                    toggleSelect(file.id, card);
                };
                
                const isVideo = file.isVideo;
                card.innerHTML = `
                    <div class="file-check"><i class="fas fa-check"></i></div>
                    <img class="file-thumb" src="${file.thumbnail}" alt="${file.name}" loading="lazy">
                    ${isVideo ? '<div class="file-badge"><i class="fas fa-play"></i> Video</div>' : ''}
                    <div class="file-info">
                        <span class="file-name" title="${file.name}">${file.name}</span>
                        <div style="display: flex; gap: 5px;">
                            <button class="btn-delete" style="opacity:1; color:#3b82f6" onclick="event.stopPropagation(); openPreviewById('${file.id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn-delete" style="opacity:1" onclick="event.stopPropagation(); promptDelete('${file.id}', 'file')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
                fileList.appendChild(card);
            });
        }
    }

    function toggleSelect(id, element) {
        if (selectedFileIds.has(id)) {
            selectedFileIds.delete(id);
            element.classList.remove('selected');
        } else {
            selectedFileIds.add(id);
            element.classList.add('selected');
        }
        updateDownloadButton();
    }

    function updateDownloadButton() {
        const dBtn = document.getElementById('multi-download-btn');
        const zBtn = document.getElementById('multi-zip-btn');
        const countSpan = document.getElementById('download-count');
        
        if (selectedFileIds.size > 0) {
            dBtn.style.display = 'inline-flex';
            zBtn.style.display = 'inline-flex';
            countSpan.innerText = `${selectedFileIds.size}개 다운로드`;
        } else {
            dBtn.style.display = 'none';
            zBtn.style.display = 'none';
        }
    }

    function selectAllFiles() {
        const cards = document.querySelectorAll('.file-card');
        const allSelected = Array.from(cards).every(card => selectedFileIds.has(card.dataset.id));
        
        if (allSelected) {
            // 모두 선택되어 있으면 해제
            selectedFileIds.clear();
            cards.forEach(card => card.classList.remove('selected'));
        } else {
            // 아니면 모두 선택
            cards.forEach(card => {
                const id = card.dataset.id;
                selectedFileIds.add(id);
                card.classList.add('selected');
            });
        }
        updateDownloadButton();
    }

    async function downloadAsZip() {
        if (selectedFileIds.size === 0) return;
        
        showCustomPrompt("ZIP 압축 다운로드", "압축 파일 이름을 입력하세요:", "haju_photos", async (zipName) => {
            if (!zipName) return;
            
            showLoader(true);
            showToast('서버에서 압축 중입니다. 잠시만 기다려 주세요...', 'info');

            try {
                const resp = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getZip',
                        itemIds: Array.from(selectedFileIds),
                        zipName: zipName
                    })
                });
                const result = await resp.json();
                
                if (result.success) {
                    showToast('압축 완료! 다운로드를 시작합니다.', 'success');
                    const link = document.createElement('a');
                    link.href = result.downloadUrl;
                    link.click();
                    
                    selectedFileIds.clear();
                    document.querySelectorAll('.file-card.selected').forEach(el => el.classList.remove('selected'));
                    updateDownloadButton();
                } else {
                    showToast(result.error, 'error');
                }
            } catch (err) {
                showToast('압축 요청 중 오류가 발생했습니다.', 'error');
            } finally {
                showLoader(false);
            }
        });
    }

    async function downloadSelected() {
        if (selectedFileIds.size === 0) return;
        
        showCustomConfirm("다운로드 확인", `${selectedFileIds.size}개의 파일을 다운로드하시겠습니까?<br><small style="color:red">* 브라우저에서 여러 파일 다운로드 권한 요청 시 '허용'을 눌러주세요.</small>`, async () => {
            const ids = Array.from(selectedFileIds);
            showToast(`${ids.length}개 파일 다운로드 시작...`, 'info');

            for (const id of ids) {
                const url = `https://drive.google.com/uc?export=download&id=${id}`;
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', '');
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                await new Promise(r => setTimeout(r, 400));
            }
            
            selectedFileIds.clear();
            document.querySelectorAll('.file-card.selected').forEach(el => el.classList.remove('selected'));
            updateDownloadButton();
        });
    }

    function openPreviewById(id) {
        const file = currentFiles.find(f => f.id === id);
        if (file) {
            openPreview(file);
        } else {
            showToast('파일 정보를 찾을 수 없습니다.', 'error');
        }
    }

    // --- Drag to Select ---
    let isDragging = false;
    let startX, startY;
    const dragSelector = document.getElementById('drag-selector');

    document.addEventListener('mousedown', e => {
        if (e.target.closest('.modal') || e.target.closest('header') || e.target.closest('.btn') || e.target.closest('.breadcrumb')) return;
        if (e.button !== 0) return; // Left click only

        isDragging = true;
        document.body.classList.add('no-select');
        startX = e.clientX;
        startY = e.clientY;
        dragSelector.style.left = startX + 'px';
        dragSelector.style.top = startY + 'px';
        dragSelector.style.width = '0px';
        dragSelector.style.height = '0px';
    });

    document.addEventListener('mousemove', e => {
        if (!isDragging) return;

        const currentX = e.clientX;
        const currentY = e.clientY;

        const left = Math.min(startX, currentX);
        const top = Math.min(startY, currentY);
        const width = Math.abs(startX - currentX);
        const height = Math.abs(startY - currentY);

        if (width > 5 || height > 5) {
            dragSelector.style.display = 'block';
            dragSelector.style.left = left + 'px';
            dragSelector.style.top = top + 'px';
            dragSelector.style.width = width + 'px';
            dragSelector.style.height = height + 'px';
            
            checkSelection(left, top, width, height);
        }
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        document.body.classList.remove('no-select');
        dragSelector.style.display = 'none';
    });

    function checkSelection(sLeft, sTop, sWidth, sHeight) {
        const cards = document.querySelectorAll('.file-card');
        const sRight = sLeft + sWidth;
        const sBottom = sTop + sHeight;

        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const cLeft = rect.left;
            const cTop = rect.top;
            const cRight = rect.right;
            const cBottom = rect.bottom;

            const isOverlap = !(cRight < sLeft || cLeft > sRight || cBottom < sTop || cTop > sBottom);
            const id = card.dataset.id;

            if (isOverlap) {
                if (!selectedFileIds.has(id)) {
                    selectedFileIds.add(id);
                    card.classList.add('selected');
                }
            } else {
                // 드래그 중에 영역에서 벗어나면 해제하시겠습니까? (옵션)
                // 현재는 드래그 영역에 포함된 것만 '추가'하는 방식입니다.
            }
        });
        updateDownloadButton();
    }

    function updateBreadcrumbs(data) {
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = `<span><a href="#" onclick="loadFolder(null)">Home</a></span>`;
        if (data.currentFolderId !== data.rootId) { // Simplified for now
            bc.innerHTML += `<i>/</i><span>${data.currentFolderName}</span>`;
        }
    }

    // --- UI Interactions ---

    function openUploadModal() {
        document.getElementById('upload-modal').classList.add('active');
        renderFolderSelect();
    }

    function closeModal(id) {
        // 업로드 중일 때는 업로드 모달 닫기 방지
        if (id === 'upload-modal' && document.getElementById('upload-btn').disabled) {
            showToast('업로드 중에는 창을 닫을 수 없습니다.', 'error');
            return;
        }
        document.getElementById(id).classList.remove('active');
        if (id === 'upload-modal') {
            resetUploadState();
        }
    }

    function renderFolderSelect() {
        const select = document.getElementById('target-folder-select');
        select.innerHTML = allFoldersList.map(f => 
            `<option value="${f.id}" ${f.id === currentFolderId ? 'selected' : ''}>${f.name}</option>`
        ).join('');
    }

    // Toggle new folder input
    document.getElementById('create-folder-check').onchange = (e) => {
        document.getElementById('new-folder-input').style.display = e.target.checked ? 'block' : 'none';
        document.getElementById('target-folder-select').disabled = e.target.checked;
    };

    // Drag and Drop
    const dropZone = document.getElementById('drop-zone');
    dropZone.onclick = () => document.getElementById('file-input').click();
    
    dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    };

    document.getElementById('file-input').onchange = e => handleFiles(e.target.files);

    let filesToUpload = [];
    function handleFiles(files) {
        const newFiles = Array.from(files);
        filesToUpload = [...filesToUpload, ...newFiles];
        renderSelectedFiles();
    }

    function renderSelectedFiles() {
        const listContainer = document.getElementById('selected-files');
        listContainer.innerHTML = filesToUpload.map((f, idx) => 
            `<div style="font-size: 0.8rem; padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%;">
                    <i class="far fa-file-image"></i> ${f.name}
                </span>
                <i class="fas fa-times" style="color: #ef4444; cursor: pointer; padding: 4px;" onclick="removeFile(${idx})"></i>
            </div>`
        ).join('');
    }

    function removeFile(index) {
        filesToUpload.splice(index, 1);
        renderSelectedFiles();
    }

    async function handleUpload() {
        if (filesToUpload.length === 0) return showToast('파일을 선택해 주세요.', 'error');
        
        const targetId = document.getElementById('target-folder-select').value;
        const isNewFolder = document.getElementById('create-folder-check').checked;
        
        let finalFolderName = "";
        if (isNewFolder) {
            const dateVal = document.getElementById('new-folder-date').value;
            const activityName = document.getElementById('new-folder-activity').value.trim();
            
            if (!dateVal || !activityName) return showToast('날짜와 활동명을 입력해 주세요.', 'error');
            
            const dateParts = dateVal.split('-');
            finalFolderName = `${dateParts[1]}${dateParts[2]} ${activityName}`;
        }
        
        showProgress(true);
        const btn = document.getElementById('upload-btn');
        btn.disabled = true;
        btn.classList.add('btn-loading');

        let currentTargetId = targetId;
        for (let i = 0; i < filesToUpload.length; i++) {
            const file = filesToUpload[i];
            updateProgress(i, filesToUpload.length, 0, file.name);
            
            try {
                const base64Data = await convertToBase64(file);
                const resp = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'upload',
                        data: base64Data,
                        fileName: file.name,
                        mimeType: file.type,
                        targetFolderId: currentTargetId,
                        newFolderName: i === 0 ? finalFolderName : ""
                    })
                });
                const result = await resp.json();
                if (!result.success) throw new Error(result.error);

                // 첫 번째 파일 업로드 후 생성된(또는 기존) 폴더 ID로 업데이트
                if (i === 0 && result.folderId) {
                    currentTargetId = result.folderId;
                }
                
                updateProgress(i + 1, filesToUpload.length, 100, file.name);
            } catch (err) {
                console.error(err);
                showToast(`${file.name} 업로드 실패`, 'error');
                break;
            }
        }

        btn.disabled = false;
        btn.classList.remove('btn-loading');
        
        showSuccessModal('업로드 완료', '모든 파일이 안전하게 저장되었습니다.');
        closeModal('upload-modal');
        loadFolder(currentFolderId);
        fetchFolderList();
    }

    function convertToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function openPreview(file) {
        const container = document.getElementById('preview-container');
        container.innerHTML = '';
        
        if (file.isVideo) {
            container.innerHTML = `
                <iframe src="${file.previewUrl}" width="800" height="450" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
                <div style="color:white; margin-top:1rem; text-align:center;">${file.name}</div>
            `;
        } else {
            container.innerHTML = `
                <img src="${file.previewUrl}" alt="${file.name}">
                <div style="color:white; margin-top:1rem; text-align:center;">${file.name}</div>
            `;
        }
        document.getElementById('preview-modal').classList.add('active');
    }

    function promptDelete(id, type) {
        itemToDelete = { id, type };
        document.getElementById('password-modal').classList.add('active');
    }

    async function confirmDelete() {
        const password = document.getElementById('admin-password').value;
        if (!password) return showToast('비밀번호를 입력하세요.', 'error');
        
        showLoader(true);
        try {
            const resp = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'delete',
                    itemId: itemToDelete.id,
                    itemType: itemToDelete.type,
                    password: password
                })
            });
            const result = await resp.json();
            if (result.success) {
                showToast('삭제되었습니다.', 'success');
                closeModal('password-modal');
                loadFolder(currentFolderId);
            } else {
                showToast(result.error, 'error');
            }
        } catch (err) {
            showToast('삭제 과정에서 오류가 발생했습니다.', 'error');
        } finally {
            showLoader(false);
            document.getElementById('admin-password').value = '';
        }
    }

    // --- Helpers ---

    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
        
        toast.innerHTML = `
            <i class="fas ${icon}"></i>
            <span>${message}</span>
        `;
        
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showSuccessModal(title, msg) {
        document.getElementById('success-title').innerText = title;
        document.getElementById('success-msg').innerHTML = msg;
        document.getElementById('success-modal').classList.add('active');
    }

    function showCustomConfirm(title, msg, onConfirm) {
        document.getElementById('confirm-title').innerText = title;
        document.getElementById('confirm-msg').innerHTML = msg;
        const okBtn = document.getElementById('confirm-ok-btn');
        okBtn.onclick = () => {
            closeModal('confirm-modal');
            onConfirm();
        };
        document.getElementById('confirm-modal').classList.add('active');
    }

    function showCustomPrompt(title, msg, defaultValue, onConfirm) {
        document.getElementById('prompt-title').innerText = title;
        document.getElementById('prompt-msg').innerHTML = msg;
        const input = document.getElementById('prompt-input');
        input.value = defaultValue;
        const okBtn = document.getElementById('prompt-ok-btn');
        okBtn.onclick = () => {
            closeModal('prompt-modal');
            onConfirm(input.value);
        };
        document.getElementById('prompt-modal').classList.add('active');
        setTimeout(() => input.focus(), 100);
    }

    function showLoader(show) {
        document.getElementById('loader').style.display = show ? 'block' : 'none';
    }

    function showProgress(show) {
        document.getElementById('upload-progress').style.display = show ? 'block' : 'none';
    }

    function updateProgress(done, total, percent, fileName) {
        const pFill = document.getElementById('progress-fill');
        const pText = document.getElementById('progress-text');
        const pPercent = document.getElementById('progress-percent');
        
        const overall = Math.floor(((done / total) * 100));
        pFill.style.width = overall + '%';
        pText.innerText = `업로드 중: ${fileName} (${done}/${total})`;
        pPercent.innerText = overall + '%';
    }

    function resetUploadState() {
        filesToUpload = [];
        document.getElementById('selected-files').innerHTML = '';
        document.getElementById('upload-progress').style.display = 'none';
        document.getElementById('upload-btn').disabled = false;
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('create-folder-check').checked = false;
        document.getElementById('new-folder-input').style.display = 'none';
        document.getElementById('target-folder-select').disabled = false;
    }

</script>
</body>
</html>
