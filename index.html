<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하주초 교육활동 사진방</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #0f172a;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.8);
            --text: #1e293b;
            --text-muted: #64748b;
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.05) 0px, transparent 50%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        body.no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--text);
            border: 1px solid #e2e8f0;
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-download {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
            display: none;
        }

        .btn-download:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .btn-zip {
            background: #8b5cf6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.2);
            display: none;
        }

        .btn-zip:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        .btn-delete-multi {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
            display: none;
        }

        .btn-delete-multi:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);
        }

        .btn-drive {
            color: #34a853;
            border-color: #34a853;
        }

        .btn-drive:hover {
            background: #f0fdf4;
            border-color: #166534;
            color: #166534;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            top: 50%;
            left: 50%;
            margin: -0.625rem 0 0 -0.625rem;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Layout */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.5rem;
        }

        .logo img {
            height: 40px;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        main {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .breadcrumb {
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            font-weight: 600;
        }

        .breadcrumb span:not(:last-child)::after {
            content: "\f054";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            margin-left: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .breadcrumb a {
            color: var(--primary-light);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--secondary);
        }

        .section-title i {
            color: var(--primary-light);
        }

        /* Folders/Files Grid */
        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .folder-card {
            background: white;
            padding: 1.25rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
        }

        .folder-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .folder-card.selected {
            background: #eff6ff;
            border-color: var(--primary);
        }

        .folder-card.selected::after {
            content: "\f00c";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            box-shadow: var(--shadow);
        }

        .folder-card i {
            font-size: 2.5rem;
            color: #fcd34d;
        }

        .folder-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .file-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .file-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
            z-index: 10;
        }

        .file-card.selected {
            background: #eff6ff;
            border: 2px solid var(--primary);
            transform: translateY(-5px) scale(0.95);
        }

        .file-check {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: var(--shadow);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }

        .file-card:hover .file-check, .file-card.selected .file-check {
            opacity: 1;
        }

        .file-card.selected .file-check {
            background: var(--primary);
            color: white;
        }

        .file-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            backdrop-filter: blur(4px);
        }

        .file-thumb {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #f1f5f9;
        }

        .file-info {
            padding: 1rem;
            text-align: center;
            background: white;
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .modal-content h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .modal-content p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .prompt-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            outline: none;
        }

        .prompt-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .upload-area {
            border: 2px dashed #e2e8f0;
            padding: 2rem;
            text-align: center;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: var(--primary-light);
            background: #f8fafc;
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        #selected-files {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: #f1f5f9;
            margin-bottom: 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }

        .progress-container {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 1rem;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-light);
            width: 0;
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            .logo span { display: none; }
            .folders-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .files-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .modal-content { padding: 1.5rem; }
        }

        /* Drag Selector */
        #drag-selector {
            position: fixed;
            border: 1px solid var(--primary-light);
            background: rgba(59, 130, 246, 0.1);
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        /* Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -25px 0 0 -25px;
            animation: spin 1s linear infinite;
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }

        .toast {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 300px;
            border-left: 5px solid var(--primary);
            pointer-events: auto;
        }

        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="loadFolder(null)">
        <img src="https://www.haju.es.kr/site/haju/img/sub/img_sub0102_02.jpg" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
        <i class="fas fa-school" style="display:none; color:var(--primary); font-size:1.8rem; margin-right:10px;"></i>
        <span>하주초 사진방</span>
    </a>
    <div class="actions">
        <a id="drive-link" href="#" target="_blank" class="btn btn-outline btn-drive" title="드라이브 바로가기">
            <i class="fab fa-google-drive"></i> 드라이브
        </a>
        <button id="multi-download-btn" class="btn btn-download" onclick="downloadSelected()">
            <i class="fas fa-download"></i> 다운로드
        </button>
        <button id="multi-zip-btn" class="btn btn-zip" onclick="downloadAsZip()">
            <i class="fas fa-file-archive"></i> ZIP 압축
        </button>
        <button id="multi-delete-btn" class="btn btn-delete-multi" onclick="deleteSelected()">
            <i class="fas fa-trash-alt"></i> 삭제
        </button>
        <button class="btn btn-primary" onclick="openUploadModal()">
            <i class="fas fa-cloud-upload-alt"></i> 업로드
        </button>
    </div>
</header>

<main>
    <div id="breadcrumb" class="breadcrumb">
        <span><a href="#" onclick="loadFolder(null)">Home</a></span>
    </div>

    <div id="folders-section">
        <h2 class="section-title"><i class="fas fa-folder-open"></i> 모든 폴더 <small style="font-weight: normal; font-size: 0.8rem; color: var(--text-muted); margin-left:10px;">(더블 클릭 시 입장)</small></h2>
        <div id="folders-list" class="folders-grid"></div>
    </div>

    <div id="files-section">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h2 class="section-title" style="margin: 0;"><i class="fas fa-images"></i> 사진 및 영상 <small style="font-weight: normal; font-size: 0.8rem; color: var(--text-muted); margin-left:10px;">(더블 클릭 시 크게 보기)</small></h2>
            <button class="btn btn-outline" style="font-size: 0.8rem; padding: 0.4rem 1rem;" onclick="selectAll()">전체 선택/해제</button>
        </div>
        <div id="files-list" class="files-grid" style="margin-top:1.5rem;"></div>
    </div>
</main>

<!-- Modals -->
<div id="upload-modal" class="modal">
    <div class="modal-content">
        <h3>파일 업로드</h3>
        <p>활동명에 맞춰 파일 이름이 **활동명1, 활동명2...**로 자동 변경됩니다.</p>
        
        <div class="form-group" style="margin-bottom:1.5rem;">
            <label class="form-label" style="display:block; margin-bottom:0.5rem; font-weight:600;">업로드 위치 선택</label>
            <select id="target-folder-select" class="form-input" style="width:100%; padding:0.75rem; border-radius:var(--radius-md); border:1px solid #e2e8f0;"></select>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom:1.5rem;">
            <input type="checkbox" id="create-folder-check" onchange="toggleNewFolderInput()">
            <label for="create-folder-check" style="font-weight: 600;">새 폴더 생성 후 업로드</label>
        </div>

        <div id="new-folder-input" class="form-group" style="display: none; background: #f8fafc; padding: 1rem; border-radius: var(--radius-md); margin-bottom:1.5rem;">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="target-date" class="form-input" placeholder="날짜(0412)" style="width: 120px; padding:0.75rem; border-radius:var(--radius-md); border:1px solid #e2e8f0;">
                <input type="text" id="target-name" class="form-input" placeholder="활동명(과학행사)" style="flex:1; padding:0.75rem; border-radius:var(--radius-md); border:1px solid #e2e8f0;">
            </div>
        </div>
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>사진이나 영상을 여기에 드래그하거나 클릭하여 선택하세요.</p>
            <input type="file" id="file-input" multiple style="display: none" onchange="handleFileSelect(event)">
        </div>
        
        <div id="selected-files"></div>

        <div id="upload-progress" class="progress-container">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top:2rem;">
            <button class="btn btn-outline" style="flex: 1" onclick="closeModal('upload-modal')">취소</button>
            <button id="upload-btn" class="btn btn-primary" style="flex: 1" onclick="handleUpload()">업로드 시작</button>
        </div>
    </div>
</div>

<div id="success-modal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <i class="fas fa-check-circle" style="font-size: 3rem; color: #10b981; margin-bottom: 1rem;"></i>
        <h3 id="success-title">완료</h3>
        <p id="success-msg"></p>
        <button class="btn btn-primary" style="width: 100%" onclick="closeModal('success-modal')">확인</button>
    </div>
</div>

<div id="confirm-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3 id="confirm-title">확인</h3>
        <p id="confirm-msg"></p>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="flex: 1" onclick="closeModal('confirm-modal')">취소</button>
            <button id="confirm-ok-btn" class="btn btn-primary" style="flex: 1">확인</button>
        </div>
    </div>
</div>

<div id="prompt-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3 id="prompt-title">입력</h3>
        <p id="prompt-msg"></p>
        <input type="text" id="prompt-input" class="prompt-input">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="flex: 1" onclick="closeModal('prompt-modal')">취소</button>
            <button id="prompt-ok-btn" class="btn btn-primary" style="flex: 1">확인</button>
        </div>
    </div>
</div>

<div id="password-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h3>삭제 확인</h3>
        <p>선택한 파일을 삭제하시겠습니까? 관리자 비밀번호를 입력하세요.</p>
        <input type="password" id="admin-password" class="prompt-input" placeholder="비밀번호 입력">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="flex: 1" onclick="closeModal('password-modal')">취소</button>
            <button class="btn btn-primary" style="flex: 1; background:#ef4444;" onclick="confirmDelete()">삭제 실행</button>
        </div>
    </div>
</div>

<div id="preview-modal" class="modal">
    <div class="modal-content" style="max-width:90vw; max-height:90vh; padding:1rem; background:transparent; box-shadow:none;">
        <button onclick="closeModal('preview-modal')" style="position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.5); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; font-size:1.5rem; z-index:2100;"><i class="fas fa-times"></i></button>
        <div id="preview-container" style="display:flex; justify-content:center; align-items:center; min-height:80vh;"></div>
    </div>
</div>

<div id="drag-selector"></div>
<div id="loader"><div class="spinner"></div></div>
<div id="toast-container"></div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzynRIlDMKyrZ5LY2xxTHXkwJjQnLcZc1Wjlk6nBtetJIsbAMHmzl3s-PlXNgJAz7w/exec';
    
    let currentFolderId = null;
    let selectedIds = new Set();
    let currentFiles = [];
    let filesToUpload = [];

    window.onload = () => {
        loadFolder(null);
        fetchFolderList();
    };

    async function loadFolder(folderId) {
        showLoader(true);
        selectedIds.clear();
        currentFiles = [];
        updateToolbar();
        try {
            const resp = await fetch(`${GAS_URL}?action=getFiles&folderId=${folderId || ''}`);
            const data = await resp.json();
            renderContent(data);
            currentFolderId = data.currentFolderId;
            
            const driveBtn = document.getElementById('drive-link');
            if (data.driveUrl) { driveBtn.href = data.driveUrl; driveBtn.style.display = 'inline-flex'; }
            else { driveBtn.style.display = 'none'; }
        } finally { showLoader(false); }
    }

    async function fetchFolderList() {
        try {
            const resp = await fetch(`${GAS_URL}?action=getAllFolders`);
            const folders = await resp.json();
            const select = document.getElementById('target-folder-select');
            select.innerHTML = '<option value="">(최상위 폴더)</option>';
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.innerText = f.name;
                if (f.id === currentFolderId) opt.selected = true;
                select.appendChild(opt);
            });
        } catch (e) {}
    }

    function renderContent(data) {
        const folderList = document.getElementById('folders-list');
        const fileList = document.getElementById('files-list');
        folderList.innerHTML = '';
        fileList.innerHTML = '';
        currentFiles = data.files;

        if (data.folders.length === 0) {
            document.getElementById('folders-section').style.display = 'none';
        } else {
            document.getElementById('folders-section').style.display = 'block';
            data.folders.forEach(f => {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.dataset.id = f.id;
                card.onclick = () => toggleSelect(f.id, card);
                card.ondblclick = () => loadFolder(f.id);
                card.innerHTML = `<i class="fas fa-folder"></i><h3>${f.name}</h3>`;
                folderList.appendChild(card);
            });
        }

        if (data.files.length === 0 && data.folders.length === 0) {
            fileList.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);">표시할 내용이 없습니다.</div>';
        } else {
            data.files.forEach(f => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.dataset.id = f.id;
                card.onclick = () => toggleSelect(f.id, card);
                card.ondblclick = () => openPreview(f);
                card.innerHTML = `
                    <div class="file-check"><i class="fas fa-check"></i></div>
                    <img class="file-thumb" src="${f.thumbnail}" loading="lazy">
                    ${f.isVideo ? '<div class="file-badge">VIDEO</div>' : ''}
                    <div class="file-info"><span class="file-name" title="${f.name}">${f.name}</span></div>
                `;
                fileList.appendChild(card);
            });
        }
    }

    function toggleSelect(id, el) {
        if (selectedIds.has(id)) { selectedIds.delete(id); el.classList.remove('selected'); }
        else { selectedIds.add(id); el.classList.add('selected'); }
        updateToolbar();
    }

    function selectAll() {
        const cards = document.querySelectorAll('.folder-card, .file-card');
        const allSelected = Array.from(cards).every(c => selectedIds.has(c.dataset.id));
        cards.forEach(c => {
            if (allSelected) { selectedIds.delete(c.dataset.id); c.classList.remove('selected'); }
            else { selectedIds.add(c.dataset.id); c.classList.add('selected'); }
        });
        updateToolbar();
    }

    function updateToolbar() {
        const dBtn = document.getElementById('multi-download-btn');
        const zBtn = document.getElementById('multi-zip-btn');
        const rBtn = document.getElementById('multi-delete-btn');
        
        const count = selectedIds.size;
        
        // 선택된 항목 중 폴더가 있는지 확인
        let hasFolder = false;
        const selectedElements = document.querySelectorAll('.selected');
        selectedElements.forEach(el => {
            if (el.classList.contains('folder-card')) hasFolder = true;
        });

        if (count > 0) {
            // 폴더가 포함되어 있으면 직접 다운로드는 숨기고 ZIP 압축만 노정
            dBtn.style.display = hasFolder ? 'none' : 'inline-flex';
            zBtn.style.display = 'inline-flex';
            rBtn.style.display = 'inline-flex';
        } else {
            dBtn.style.display = 'none';
            zBtn.style.display = 'none';
            rBtn.style.display = 'none';
        }
    }

    function deleteSelected() {
        if (selectedIds.size === 0) return;
        document.getElementById('admin-password').value = '';
        document.getElementById('password-modal').classList.add('active');
    }

    async function confirmDelete() {
        const password = document.getElementById('admin-password').value;
        if (!password) return showToast('비밀번호를 입력하세요.', 'error');
        
        showLoader(true);
        try {
            const resp = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'delete',
                    itemIds: Array.from(selectedIds),
                    password: password
                })
            });
            const result = await resp.json();
            if (result.success) {
                showToast(result.message || '삭제되었습니다.', 'success');
                closeModal('password-modal');
                loadFolder(currentFolderId);
            } else {
                showToast(result.error, 'error');
            }
        } finally { showLoader(false); }
    }

    async function downloadSelected() {
        const ids = Array.from(selectedIds);
        showToast('다운로드를 시작합니다 (파일 항목만 해당)...', 'info');
        for (const id of ids) {
            const file = currentFiles.find(f => f.id === id);
            if (!file) continue;
            const link = document.createElement('a');
            link.href = `https://drive.google.com/uc?export=download&id=${id}`;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            await new Promise(r => setTimeout(r, 400));
        }
    }

    async function downloadAsZip() {
        showCustomPrompt("ZIP 압축", "압축 파일명을 입력하세요:", "haju_download", async (zipName) => {
            if (!zipName) return;
            showLoader(true);
            showToast('압축 중입니다...', 'info');
            try {
                const resp = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getZip', itemIds: Array.from(selectedIds), zipName: zipName })
                });
                const result = await resp.json();
                if (result.success) {
                    const link = document.createElement('a');
                    link.href = result.downloadUrl;
                    link.click();
                    showToast('압축 완료!', 'success');
                } else { showToast(result.error, 'error'); }
            } finally { showLoader(false); }
        });
    }

    // --- Upload Logic ---
    function openUploadModal() {
        filesToUpload = [];
        document.getElementById('selected-files').innerHTML = '';
        document.getElementById('upload-modal').classList.add('active');
        fetchFolderList();
    }

    function handleFileSelect(e) {
        const files = Array.from(e.target.files);
        const container = document.getElementById('selected-files');
        files.forEach(f => {
            filesToUpload.push(f);
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${f.name}</span><i class="fas fa-times" onclick="this.parentElement.remove(); filesToUpload=filesToUpload.filter(x=>x!==f);"></i>`;
            container.appendChild(div);
        });
    }

    async function handleUpload() {
        if (filesToUpload.length === 0) return showToast('파일을 선택하세요.', 'error');
        
        const isNewFolder = document.getElementById('create-folder-check').checked;
        const targetDate = document.getElementById('target-date').value;
        const targetName = document.getElementById('target-name').value;
        
        if (isNewFolder && (!targetDate || !targetName)) return showToast('날짜와 활동명을 입력하세요.', 'error');
        
        const folderNameForGAS = isNewFolder ? `${targetDate} ${targetName}` : "";
        // 파일 이름 규칙: 활동명(숫자 제외) + 번호
        const baseFileName = isNewFolder ? targetName : (document.getElementById('target-folder-select').selectedOptions[0].text.split(' ')[1] || '파일');
        
        let currentTargetId = document.getElementById('target-folder-select').value;
        const btn = document.getElementById('upload-btn');
        btn.disabled = true; btn.classList.add('btn-loading');
        
        document.getElementById('upload-progress').style.display = 'block';
        const fill = document.getElementById('progress-fill');

        for (let i = 0; i < filesToUpload.length; i++) {
            const file = filesToUpload[i];
            const ext = file.name.split('.').pop();
            const newName = `${baseFileName}${i + 1}.${ext}`;
            
            try {
                const base64 = await convertBase64(file);
                const resp = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'upload',
                        data: base64,
                        fileName: newName,
                        mimeType: file.type,
                        targetFolderId: currentTargetId,
                        newFolderName: i === 0 ? folderNameForGAS : ""
                    })
                });
                const res = await resp.json();
                if (i === 0 && res.folderId) currentTargetId = res.folderId;
                fill.style.width = ((i + 1) / filesToUpload.length * 100) + '%';
            } catch (e) { showToast(`${file.name} 업로드 실패`, 'error'); break; }
        }

        btn.disabled = false; btn.classList.remove('btn-loading');
        showSuccessModal('완료', '업로드가 완료되었습니다.');
        closeModal('upload-modal');
        loadFolder(currentFolderId);
    }

    // --- Drag Logic ---
    let isDragging = false;
    let startX, startY;
    const dragSelector = document.getElementById('drag-selector');

    document.addEventListener('mousedown', e => {
        if (e.target.closest('.modal') || e.target.closest('header') || e.target.closest('.btn')) return;
        if (!e.target.closest('.file-card') && !e.target.closest('.folder-card')) {
            selectedIds.clear();
            document.querySelectorAll('.selected').forEach(x => x.classList.remove('selected'));
            updateToolbar();
        }
        if (e.button !== 0) return;
        isDragging = true;
        startX = e.clientX; startY = e.clientY;
        dragSelector.style.left = startX + 'px'; dragSelector.style.top = startY + 'px';
        dragSelector.style.width = '0px'; dragSelector.style.height = '0px';
    });

    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const left = Math.min(startX, e.clientX); const top = Math.min(startY, e.clientY);
        const width = Math.abs(startX - e.clientX); const height = Math.abs(startY - e.clientY);
        if (width > 5 || height > 5) {
            dragSelector.style.display = 'block';
            dragSelector.style.left = left + 'px'; dragSelector.style.top = top + 'px';
            dragSelector.style.width = width + 'px'; dragSelector.style.height = height + 'px';
            checkOverlap(left, top, width, height);
        }
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        dragSelector.style.display = 'none';
        document.body.classList.remove('no-select');
    });

    function checkOverlap(sL, sT, sW, sH) {
        const cards = document.querySelectorAll('.folder-card, .file-card');
        const sR = sL + sW; const sB = sT + sH;
        cards.forEach(c => {
            const r = c.getBoundingClientRect();
            const overlap = !(r.right < sL || r.left > sR || r.bottom < sT || r.top > sB);
            if (overlap) { selectedIds.add(c.dataset.id); c.classList.add('selected'); }
        });
        updateToolbar();
    }

    // --- Helpers ---
    function showLoader(s) { document.getElementById('loader').style.display = s ? 'block' : 'none'; }
    function showToast(m, t) {
        const container = document.getElementById('toast-container');
        const div = document.createElement('div');
        div.className = `toast ${t}`;
        div.innerHTML = `<i class="fas fa-info-circle"></i><span>${m}</span>`;
        container.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function showSuccessModal(t, m) {
        document.getElementById('success-title').innerText = t;
        document.getElementById('success-msg').innerText = m;
        document.getElementById('success-modal').classList.add('active');
    }
    function showCustomPrompt(t, m, v, cb) {
        const modal = document.getElementById('prompt-modal');
        document.getElementById('prompt-title').innerText = t;
        document.getElementById('prompt-msg').innerText = m;
        const input = document.getElementById('prompt-input');
        input.value = v;
        document.getElementById('prompt-ok-btn').onclick = () => { closeModal('prompt-modal'); cb(input.value); };
        modal.classList.add('active');
    }
    function toggleNewFolderInput() {
        const chk = document.getElementById('create-folder-check').checked;
        document.getElementById('new-folder-input').style.display = chk ? 'block' : 'none';
        document.getElementById('target-folder-select').disabled = chk;
    }
    function convertBase64(file) {
        return new Promise((r, j) => {
            const rd = new FileReader();
            rd.readAsDataURL(file);
            rd.onload = () => r(rd.result);
            rd.onerror = e => j(e);
        });
    }
    function openPreview(f) {
        const container = document.getElementById('preview-container');
        container.innerHTML = f.isVideo ? `<iframe src="${f.previewUrl}" style="width:80vw; height:80vh; border:none;"></iframe>` : `<img src="${f.previewUrl}" style="max-width:100%; max-height:80vh; border-radius:var(--radius-md); box-shadow:var(--shadow-lg);">`;
        document.getElementById('preview-modal').classList.add('active');
    }
</script>
</body>
</html>
